spring.application.name=h2togo-routing
server.port=8080

# Nivel de log de los paquetes propios (DEBUG muestra cada paso de A*)
logging.level.com.h2togo.routing=INFO

# Para ver las solicitudes HTTP sin filtros de Spring Security
logging.level.org.springframework.web=WARN

# Reduce la presión de memoria del servidor embebido Tomcat
server.tomcat.threads.max=4
server.tomcat.threads.min-spare=1
